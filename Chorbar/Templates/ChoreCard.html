<article class="chore">
  <h3 hx-get="chore/details" hx-vals='{"label":"{{label}}" }' hx-target="#modal" hx-swap="outerHTML"
    hx-target="#chore-info">
    {{label}}
  </h3>
  <footer>
    <div class="badges">
      {{..badges}}
    </div>
    <form class="do small" hx-post="chore/do" hx-target="closest .chore" hx-swap="outerHTML">
      <input type="hidden" id="label" Value="{{label}}" name="label">
      <button type="submit">✓</button>
    </form>
  </footer>
</article>
