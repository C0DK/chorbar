<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="shortcut icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
    integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.4"

    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/hyperscript.org@0.9.14"></script>
  <link rel="stylesheet" href="/static/style.css">
  <title>{{title}}</title>
</head>

<body hx-ext="sse" hx-headers='{"X-CSRF-TOKEN": "{{csrfToken}}"}'
  hx-on::config-request="event.detail.headers['X-Nav-State'] = document.getElementById('nav')?.dataset.state ?? ''">

  {{nav}}

    {{content}}

  <div id="modal"></div>
  <footer>
    Chorbar - A very unfinished product
  </footer>
</body>

</html>
