<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="shortcut icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
    integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.4"
    integrity="sha384-A986SAtodyH8eg8x8irJnYUk7i9inVQqYigD6qZ9evobksGNIXfeFvDwLSHcp31N"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/hyperscript.org@0.9.14"></script>
  <link rel="stylesheet" href="/static/style.css">
  <title>{{title}}</title>
</head>

<body hx-ext="sse" hx-headers='{"X-CSRF-TOKEN": "{{csrfToken}}"}'>

  <nav>
    {% if inHousehold %}
    <a class="btn small outline" href="/household/" hx-boost="true" hx-history="true" hx-swap="innerHTML"
      hx-target="#modal">
      {{householdName}} ▾
    </a>
    {% end %}
    {% if authed %}
    <a class="btn small outline" href="/auth/logout" hx-boost="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </a>
    {% end %}
  </nav>
  <main>
    {{content}}
  </main>
  <div id="modal"></div>
  <footer>
    Chorbar - A very unfinished product
  </footer>
</body>

</html>
