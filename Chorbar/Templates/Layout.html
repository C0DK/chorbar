<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description"
    content="Chor.bar helps households agree on how often chores should get done, track who did what, and share the mental load. Open source, privacy-friendly, no nagging required.">

  <link rel="canonical" href="https://chor.bar/">



  <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
  <link rel="icon" type="image/png" href="/static/favicon/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
  <link href="https://fonts.cdnfonts.com/css/inter" rel="stylesheet">


  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
    integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.4"
    integrity="sha384-A986SAtodyH8eg8x8irJnYUk7i9inVQqYigD6qZ9evobksGNIXfeFvDwLSHcp31N"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.7/Sortable.min.js"
    integrity="sha256-v0JBvHP+9/EcWaKDpp/oBRzdMcbY/1orm6IZ54Mfz3Y=" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/hyperscript.org@0.9.14"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    htmx.onLoad(function (content) {
      var sortables = content.querySelectorAll(".sortable");
      for (var i = 0; i < sortables.length; i++) {
        var sortable = sortables[i];
        var group = sortable.dataset.sortableGroup;
        var sortableInstance = new Sortable(sortable, {
          animation: 150,
          group: group,
          // Make the `.htmx-indicator` unsortable
          filter: ".htmx-indicator, .no-sort",

          preventOnFilter: false,
          handle: ".sortable-handle",

          // Disable sorting on the `end` event
          onAdd: function (evt) {
            this.option("disabled", true);
          },
          onUpdate: function (evt) {
            this.option("disabled", true);
          }
        });

        // Re-enable sorting on the `htmx:afterSwap` event
        sortable.addEventListener("htmx:afterSwap", function () {
          sortableInstance.option("disabled", false);
        });
      }
    })
    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }
    document.addEventListener("click", function (e) {
      var btn = e.target.closest(".do button[type=submit]");
      if (!btn) return;
      var rect = btn.getBoundingClientRect();
      confetti({

        angle: randomInRange(55, 125),
        particleCount: randomInRange(50, 100),
        spread: randomInRange(50, 70),
        origin: {
          x: (rect.left + rect.width / 2) / window.innerWidth,
          y: (rect.top + rect.height / 2) / window.innerHeight
        },
        startVelocity: 25,
        gravity: 1.2,
        ticks: 150
      });
    });

    document.addEventListener("toggle", function (e) {
      if (!(e.target instanceof HTMLElement) || !e.target.hasAttribute("popover")) return;
      var open = e.newState === "open";
      var apply = function () {
        document.querySelectorAll("body > :not([popover])").forEach(function (el) {
          el.inert = open;
        });
      };
      if (open) apply();
      else setTimeout(apply, 30); // sometimes the touch thing is too quick and will click through.
    }, true);
  </script>

  <link rel="stylesheet" href="/static/style.css?v={{cssHash}}">
  <title>{{title}}</title>

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://chor.bar/">
  <meta property="og:title" content="Chor.bar — Shared household chore tracking, without the nagging">
  <meta property="og:description"
    content="Agree on how often chores should get done, tick them off, and share the mental load. Open source and privacy-friendly.">

  <meta property="og:site_name" content="Chor.bar">
  <meta property="og:locale" content="en">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Chor.bar — Shared household chore tracking">
  <meta name="twitter:description"
    content="Agree on how often chores should get done, tick them off, and share the mental load. Open source.">
</head>

<body hx-ext="sse" hx-headers='{"X-CSRF-TOKEN": "{{csrfToken}}"}'>

  {{nav}}
  <main>
    {{content}}
  </main>
  <div id="modal"></div>
  <footer>
    <span><em class="brand">Chor.bar</em> - A very unfinished product by <a href="https://cwb.dk">cwb.dk</a></span>
  </footer>
</body>

</html>
