<li class="chore-activity">
  <form hx-post="chore/undo" hx-target="closest .chore" hx-swap="outerHTML"
    hx-confirm="Are you sure you want to undo the {{timeAgo}} activity?">
    <input type="hidden" Value="{{label}}" name="label" />
    <input type="hidden" Value="{{timestamp}}" name="timestamp" />
    <button type="submit">❌</button>
  </form>
  Done {{timeAgo}}
</li>
