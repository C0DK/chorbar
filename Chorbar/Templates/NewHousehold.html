<h2> Create New household </h2>

<form id="new-household" hx-post="/household/new" hx-target="body" hx-swap="outerHTML">
  <label for="name">Name: </label>
  <input required type="text" id="name" name="name" placeholder="What should we call the household?" />
  <button type="submit">Create</button>
</form>
